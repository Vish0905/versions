name: Daily Security Patch Checker

on:
  schedule:
    - cron: '0 8 * * *' # Runs every single day at 08:00 AM UTC
  workflow_dispatch: # Allows you to trigger it manually via the UI

# Global environment variables applied to all jobs and steps
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  check-releases:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Alert Script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python check_releases.py
